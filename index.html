<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erfan Azadehnia</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:   #EEECEC;
  --card: #D5D4CF;
  --navy: #000B28;
  --subtitle: rgba(40, 0, 1, 0.70);
  --r:    26px;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
  --dur:  1s;
}
html, body { width:100%; height:100%; background:var(--bg); overflow:hidden; }

#app {
  font-family:-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  background:var(--bg);
  width:100%; height:100vh;
  overflow:hidden; position:relative;
}

/* ── IDENTITY PANEL ── */
#identity {
  position:absolute; top:0; left:0; bottom:0;
  width:260px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:18px;
  padding:0 28px;
  z-index:2;
  transform:translateX(calc(50vw - 170px));
  transition:transform var(--dur) var(--ease);
}
#identity.sidebar {
  transform:translateX(0);
  align-items:flex-start;
}

/* Avatar */
#av {
  width:258px; height:317px; border-radius:37px;
  background:#B56035;
  display:flex; align-items:center; justify-content:center;
  border:1px solid var(--navy);
  flex-shrink:0; overflow:hidden;
  transition:width var(--dur) var(--ease),
             height var(--dur) var(--ease),
             border-radius var(--dur) var(--ease);
}
#identity.sidebar #av { width:173px; height:207px; border-radius:37px; }

#av img {
  width:100%; height:100%;
  object-fit:cover; display:block;
  /* color photo — no filter */
}
#av span {
  font-size:72px; font-weight:800;
  color:rgba(255,255,255,0.7); letter-spacing:-3px;
  transition:font-size var(--dur) var(--ease);
}
#identity.sidebar #av span { font-size:36px; }

/* Text group */
#text-group {
  display:flex; flex-direction:column; gap:0;
  align-items:center;
}
#identity.sidebar #text-group { align-items:flex-start; }

#iname {
  font-size:48px; font-weight:860; color:var(--navy);
  text-align:center; line-height:1.05;
  white-space:nowrap;
  transition:font-size var(--dur) var(--ease);
}
#identity.sidebar #iname { font-size:48px; text-align:left; }

#ititle {
  font-size:48px; font-weight:860; color:var(--subtitle);
  text-align:center; line-height:1.1; white-space:nowrap;
  transition:font-size var(--dur) var(--ease);
}
#identity.sidebar #ititle { font-size:32px; text-align:center; }

/* Icons row */
#iicons {
  display:flex; gap:22px; align-items:center;
  justify-content:center;
}
#identity.sidebar #iicons { justify-content:flex-start; }

/* Works label */
#works-label {
  font-size:18px; font-weight:800; color:var(--navy); letter-spacing:-0.2px;
  max-height:0; overflow:hidden; opacity:0;
  transition:max-height var(--dur) var(--ease), opacity var(--dur) var(--ease);
}
#identity.sidebar #works-label { max-height:40px; opacity:1; }

/* Icon buttons */
.ib {
  width:34px; height:34px; border-radius:8px;
  border:1.5px solid rgba(0,11,40,0.18);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; text-decoration:none; flex-shrink:0;
  transition:background 0.2s var(--ease);
  opacity:0; transform:translateX(-14px);
  animation:iconIn var(--dur) var(--ease) forwards;
}
.ib:hover { background:rgba(0,11,40,0.07); }
.ib svg { display:block; }

.ib:nth-child(1) { animation-delay:0.00s; }
.ib:nth-child(2) { animation-delay:0.05s; }
.ib:nth-child(3) { animation-delay:0.10s; }
.ib:nth-child(4) { animation-delay:0.15s; }

@keyframes iconIn {
  to { opacity:1; transform:translateX(0); }
}

/* ── GRID / GALLERY ── */
#grid {
  position:absolute; top:0; bottom:0;
  left:260px; right:0;
  overflow-y:auto; overflow-x:hidden;
  display:flex; flex-direction:column; align-items:center;
  gap:160px;
  padding-bottom:0;
  transform:translateX(100%);
  transition:transform var(--dur) var(--ease);
}
#grid.show { transform:translateX(0); }

#grid::-webkit-scrollbar { width:5px; }
#grid::-webkit-scrollbar-track { background:transparent; }
#grid::-webkit-scrollbar-thumb { background:rgba(0,11,40,0.12); border-radius:3px; }

/* Masonry container — exact Figma coordinates scaled */
#masonry {
  position:relative;
  width:855px;
  height:2938px;
  padding-bottom:40px;
  margin:20px 0 0;
  flex-shrink:0;
}

/* Cards — outline = outside stroke (not border) per Figma */
.c {
  position:absolute;
  background:var(--card);
  border-radius:var(--r);
  outline:2px white solid;
  overflow:hidden;
  cursor:pointer;
  opacity:0;
  transition:opacity 0.8s var(--ease);
}
/* Two cards use 90% opacity white outline */
.c[data-outline="soft"] { outline:2px rgba(255, 255, 255, 0.90) solid; }
.c:hover { filter:brightness(0.96); }
.c.show { opacity:1; }

.c video, .c img.card-img {
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:cover;
  pointer-events:none;
  border-radius:var(--r);
}

/* ── Password Input (inline, below icons) ── */
#pw-box {
  position:relative;
  width:241px; height:49px;
  max-height:0; opacity:0; overflow:hidden;
  transition:max-height 0.5s var(--ease), opacity 0.4s var(--ease);
}
#pw-box.visible { max-height:60px; opacity:1; overflow:visible; }

#pw-input {
  width:241px; height:41px;
  margin-top:4px;
  padding:0 52px 0 14px;
  font-size:32px; font-weight:100; font-family:'SF Pro', -apple-system, sans-serif;
  color:rgba(0,0,0,0.85); background:white;
  border:1px solid #B2B4BB;
  border-radius:10px; outline:none;
  transition:border-color 0.2s var(--ease);
}
#pw-input:focus { border-color:var(--navy); }
#pw-input::placeholder { color:rgba(0,0,0,0.6); font-weight:100; }

@keyframes shake {
  0%,100% { transform:translateX(0); }
  20%,60% { transform:translateX(-6px); }
  40%,80% { transform:translateX(6px); }
}
#pw-box.shake { animation:shake 0.4s var(--ease); }

#pw-btn {
  position:absolute; right:0; top:0;
  width:47px; height:49px;
  display:flex; align-items:center; justify-content:center;
  background:none; border:none;
  cursor:pointer;
  transition:opacity 0.2s var(--ease);
}
#pw-btn:hover { opacity:0.6; }
#pw-btn svg { display:block; }

/* ── DEMO REEL ── */
#demo-reel {
  width:854px;
  display:flex; flex-direction:column;
  align-items:center;
  gap:39px;
  margin:0 auto 0;
  flex-shrink:0;
  opacity:0;
  transition:opacity 0.8s var(--ease);
}
#demo-reel.show { opacity:1; }

.dr-text {
  display:flex; flex-direction:column;
  align-items:center;
}
.dr-title {
  font-size:48px; font-weight:860;
  color:var(--navy); text-align:center;
}
.dr-sub {
  font-size:32px; font-weight:400;
  color:rgba(40, 0, 1, 0.70); text-align:center;
  width:816px;
}
.dr-video {
  border-radius:var(--r);
  outline:2px white solid;
  overflow:hidden;
  background:var(--card);
}

#ease-tag {
  position:fixed; bottom:12px; left:50%; transform:translateX(-50%);
  font-size:10.5px; color:rgba(0,11,40,0.28);
  font-family:ui-monospace,'SF Mono',monospace;
  white-space:nowrap; pointer-events:none;
}

<script>
(function () {
  /* ── Email ── */
  var u = 'motionthis';
  var d = 'gmail.com';
  document.getElementById('btn-em').href = 'mai' + 'lto:' + u + '@' + d;

  /* ── Elements ── */
  var identity = document.getElementById('identity');
  var grid     = document.getElementById('grid');
  var cards    = document.querySelectorAll('.c');
  var open     = false;

  /* ── Sort cards by top position for sequential animation ── */
  var sortedCards = Array.from(cards).sort(function (a, b) {
    return parseFloat(a.style.top) - parseFloat(b.style.top);
  });

  /* ── Password input elements ── */
  var demoReel = document.getElementById('demo-reel');

  var pwBox    = document.getElementById('pw-box');
  var pwInput  = document.getElementById('pw-input');
  var pwBtn    = document.getElementById('pw-btn');
  var authenticated = false;

  function showPassword() {
    pwInput.value = '';
    pwBox.classList.remove('shake');
    pwBox.classList.add('visible');
    setTimeout(function () { pwInput.focus(); }, 400);
  }

  function hidePassword() {
    pwBox.classList.remove('visible');
  }

  function submitPassword() {
    if (pwInput.value === 'Erfan') {
      authenticated = true;
      hidePassword();
      openWorks();
    } else {
      pwInput.value = '';
      pwBox.classList.remove('shake');
      void pwBox.offsetWidth;
      pwBox.classList.add('shake');
      pwInput.focus();
    }
  }

  pwBtn.addEventListener('click', submitPassword);
  pwInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') submitPassword();
  });

  /* ── Open / Close works ── */
  function openWorks() {
    open = true;
    identity.classList.add('sidebar');
    grid.classList.add('show');

    sortedCards.forEach(function (c, i) {
      var delay = 300 + i * 80;
      setTimeout(function () {
        c.classList.add('show');
        var v = c.querySelector('video');
        if (v) v.play().catch(function(){});
      }, delay);
    });

    /* Show Demo Reel after all cards */
    var demoDelay = 300 + sortedCards.length * 80 + 200;
    setTimeout(function () {
      demoReel.classList.add('show');
    }, demoDelay);
  }

  function closeWorks() {
    open = false;
    hidePassword();
    demoReel.classList.remove('show');
    var reversed = sortedCards.slice().reverse();
    reversed.forEach(function (c, i) {
      var delay = i * 50;
      setTimeout(function () { c.classList.remove('show'); }, delay);
    });

    setTimeout(function () {
      grid.classList.remove('show');
      identity.classList.remove('sidebar');
    }, cards.length * 50 + 200);
  }

  /* ── Toggle ── */
  window.toggle = function () {
    if (!open && !authenticated) {
      showPassword();
      return;
    }
    if (!open) {
      openWorks();
    } else {
      closeWorks();
    }
  };
}());
</script>
