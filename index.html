<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erfan Azadehnia</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:   #EDECEC;
  --card: #D5D4CF;
  --navy: #000B28;
  --subtitle: rgba(40, 0, 1, 0.70);
  --r:    26px;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
  --dur:  1s;
}
html, body { width:100%; height:100%; background:var(--bg); overflow:hidden; }

#app {
  font-family:-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  background:var(--bg);
  width:100%; height:100vh;
  overflow:hidden; position:relative;
}

/* ── IDENTITY PANEL ── */
#identity {
  position:absolute; top:0; left:0; bottom:0;
  width:420px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:18px;
  padding:0 28px;
  z-index:2;
  transform:translateX(calc(50vw - 210px));
  transition:transform var(--dur) var(--ease),
             top var(--dur) var(--ease),
             bottom var(--dur) var(--ease);
}
#identity.sidebar {
  transform:translateX(var(--sidebar-x, 149px));
  align-items:flex-start;
}

/* Avatar */
#av {
  width:258px; height:317px; border-radius:37px;
  background:#B56035;
  display:flex; align-items:center; justify-content:center;
  border:1px solid var(--navy);
  flex-shrink:0; overflow:hidden;
  transition:width var(--dur) var(--ease),
             height var(--dur) var(--ease),
             border-radius var(--dur) var(--ease);
}
#identity.sidebar #av { width:173px; height:207px; border-radius:37px; }

#av img {
  width:100%; height:100%;
  object-fit:cover; display:block;
}
#av span {
  font-size:72px; font-weight:800;
  color:rgba(255,255,255,0.7); letter-spacing:-3px;
  transition:font-size var(--dur) var(--ease);
}
#identity.sidebar #av span { font-size:36px; }

/* Text group */
#text-group {
  display:flex; flex-direction:column; gap:0;
  align-items:center;
}
#identity.sidebar #text-group { align-items:flex-start; }

#iname {
  font-size:48px; font-weight:860; color:var(--navy);
  text-align:center; line-height:1.05;
  white-space:nowrap;
  transition:font-size var(--dur) var(--ease);
}
#identity.sidebar #iname { font-size:48px; text-align:left; }

#ititle {
  font-size:48px; font-weight:860; color:var(--subtitle);
  text-align:center; line-height:1.1; white-space:nowrap;
  transition:font-size var(--dur) var(--ease);
}
#identity.sidebar #ititle { font-size:32px; text-align:left; }

/* Icons row */
#iicons {
  display:flex; gap:22px; align-items:center;
  justify-content:center;
}
#identity.sidebar #iicons { justify-content:flex-start; }

/* Works label */
#works-label {
  font-size:32px; font-weight:860; color:var(--navy); letter-spacing:-0.2px;
  background:white; padding:0 5px;
  max-height:0; overflow:hidden; opacity:0;
  transition:max-height var(--dur) var(--ease), opacity var(--dur) var(--ease);
}
#identity.sidebar #works-label { max-height:50px; opacity:1; }

/* Icon buttons */
.ib {
  width:34px; height:34px; border-radius:8px;
  border:1.5px solid rgba(0,11,40,0.18);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; text-decoration:none; flex-shrink:0;
  transition:background 0.2s var(--ease);
  opacity:0; transform:translateX(-14px);
  animation:iconIn var(--dur) var(--ease) forwards;
}
.ib:hover { background:rgba(0,11,40,0.07); }
.ib svg { display:block; }

.ib:nth-child(1) { animation-delay:0.00s; }
.ib:nth-child(2) { animation-delay:0.05s; }
.ib:nth-child(3) { animation-delay:0.10s; }
.ib:nth-child(4) { animation-delay:0.15s; }

@keyframes iconIn {
  to { opacity:1; transform:translateX(0); }
}

/* ── GRID / GALLERY ── */
#grid {
  position:absolute; top:0; bottom:0;
  left:var(--grid-left, 680px); right:0;
  overflow-y:auto; overflow-x:hidden;
  display:flex; flex-direction:column; align-items:center;
  padding-bottom:0;
  transform:translateX(100%);
  transition:transform var(--dur) var(--ease);
}
#grid.show { transform:translateX(0); }

#grid::-webkit-scrollbar { width:5px; }
#grid::-webkit-scrollbar-track { background:transparent; }
#grid::-webkit-scrollbar-thumb { background:rgba(0,11,40,0.12); border-radius:3px; }

/* Masonry container — exact Figma coordinates */
#masonry {
  position:relative;
  width:855px;
  height:4343px;
  padding-bottom:40px;
  margin:20px 0 0;
  flex-shrink:0;
}

/* Cards — outline = outside stroke (not border) per Figma */
.c {
  position:absolute;
  background:var(--card);
  border-radius:var(--r);
  outline:2px white solid;
  overflow:hidden;
  cursor:pointer;
  opacity:0;
  transition:opacity 0.8s var(--ease);
}
.c[data-outline="soft"] { outline:2px rgba(255, 255, 255, 0.90) solid; }
.c:hover { filter:brightness(0.96); }
.c.show { opacity:1; }

.c video, .c img.card-img {
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:cover;
  pointer-events:none;
  border-radius:var(--r);
}

/* ── Password Input (inline, below icons) ── */
#pw-box {
  position:relative;
  width:241px; height:49px;
  max-height:0; opacity:0; overflow:hidden;
  transition:max-height 0.5s var(--ease), opacity 0.4s var(--ease);
}
#pw-box.visible { max-height:60px; opacity:1; overflow:visible; }

#pw-input {
  width:241px; height:41px;
  margin-top:4px;
  padding:0 52px 0 14px;
  font-size:32px; font-weight:100; font-family:'SF Pro', -apple-system, sans-serif;
  color:rgba(0,0,0,0.85); background:white;
  border:1px solid #B2B4BB;
  border-radius:10px; outline:none;
  transition:border-color 0.2s var(--ease);
}
#pw-input:focus { border-color:var(--navy); }
#pw-input::placeholder { color:rgba(0,0,0,0.6); font-weight:100; }

@keyframes shake {
  0%,100% { transform:translateX(0); }
  20%,60% { transform:translateX(-6px); }
  40%,80% { transform:translateX(6px); }
}
#pw-box.shake { animation:shake 0.4s var(--ease); }

#pw-btn {
  position:absolute; right:0; top:0;
  width:47px; height:49px;
  display:flex; align-items:center; justify-content:center;
  background:none; border:none;
  cursor:pointer;
  transition:opacity 0.2s var(--ease);
}
#pw-btn:hover { opacity:0.6; }
#pw-btn svg { display:block; }

/* ── DEMO REEL ── */
#demo-reel {
  width:854px;
  display:flex; flex-direction:column;
  align-items:center;
  gap:39px;
  margin:60px auto 0;
  padding-bottom:calc(100vh - 620px);
  flex-shrink:0;
  opacity:0;
  transition:opacity 0.8s var(--ease);
}
#demo-reel.show { opacity:1; }

.dr-text {
  display:flex; flex-direction:column;
  align-items:center;
}
.dr-title {
  font-size:48px; font-weight:860;
  color:var(--navy); text-align:center;
}
.dr-sub {
  font-size:32px; font-weight:400;
  color:rgba(40, 0, 1, 0.70); text-align:center;
  width:816px;
}
.dr-video {
  border-radius:var(--r);
  outline:2px white solid;
  overflow:hidden;
  background:var(--card);
}

/* ── TABLET / iPad + iPhone (profile on top, masonry grid below, scaled to fit) ── */
@media (max-width:1200px) {
  html, body { overflow:auto; height:auto; }
  #app { overflow:auto; height:auto; position:static; }

  #identity {
    position:static;
    width:100%;
    transform:none !important;
    padding:52px 8px 0;
    align-items:center;
    justify-content:center;
  }
  #identity.sidebar {
    transform:none !important;
    align-items:center;
  }
  #identity.sidebar #text-group { align-items:center; }
  #identity.sidebar #iicons { justify-content:center; }
  #identity.sidebar #iname { text-align:center; }
  #identity.sidebar #ititle { text-align:center; }

  #av { width:173px; height:207px; border-radius:37px; }
  #identity.sidebar #av { width:173px; height:207px; border-radius:37px; }
  #iname { font-size:40px; }
  #identity.sidebar #iname { font-size:40px; }
  #ititle { font-size:24px; white-space:normal; }
  #identity.sidebar #ititle { font-size:24px; }
  #works-label { font-size:24px; }
  #pw-box { width:200px; }
  #pw-input { width:200px; font-size:24px; }

  #grid {
    position:static;
    left:auto; right:auto; top:auto; bottom:auto;
    transform:none !important;
    overflow:visible;
    padding:0 8px;
    margin-top:30px;
    display:none;
  }
  #grid.show { transform:none !important; display:flex; }

  /* Masonry keeps absolute layout — zoom scales it to fit */
  #masonry { margin:0 auto; }

  .c[data-card="layout-small"] { display:none !important; }

  /* iPhone-specific — more bottom gap + clip Vimeo video corners */
  @media (max-width:768px) {
    #demo-reel { padding-bottom:140px !important; }
    .dr-video {
      overflow:hidden;
      -webkit-mask-image:-webkit-radial-gradient(white, black); /* fixes iOS Safari corner clipping */
    }
    .dr-video iframe {
      border-radius:var(--r) !important;
    }
  }

  #rigs-section { width:100%; margin:40px auto 0; }
  .rigs-label { font-size:20px; width:100%; }
  .rigs-grid { width:100%; }
  .rigs-grid .c { width:100% !important; height:auto !important; aspect-ratio:402/379; }

  #demo-reel { margin:60px auto 0; padding-bottom:140px; }
  .dr-title { font-size:32px; }
  .dr-sub { font-size:20px; width:100%; }
  .dr-video { width:100% !important; aspect-ratio:16/9; }

  .c { opacity:0; transition:opacity 0.6s var(--ease); }
  .c.show { opacity:1; }
}

/* ── TEMPLATE & RIGS SECTION ── */
#rigs-section {
  width:854px;
  display:flex; flex-direction:column;
  align-items:flex-start;
  gap:39px;
  margin:60px auto 0;
  flex-shrink:0;
  opacity:0;
  transition:opacity 0.8s var(--ease);
}
#rigs-section.show { opacity:1; }

.rigs-label {
  font-size:32px; font-weight:400;
  color:rgba(40, 0, 1, 0.70);
  text-align:left;
  font-family:-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
}
.rigs-grid {
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:30px;
}
.rigs-grid .c {
  position:relative;
  width:402px; height:379px;
  opacity:0;
  transition:opacity 0.8s var(--ease);
}
.rigs-grid .c.show { opacity:1; }

/* ── VIDEO LIGHTBOX (tablet/phone only) ── */
#video-modal {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.92);
  z-index:1000;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:60px 12px 20px;
}
#video-modal.show { display:flex; }

#video-modal video {
  width:100%;
  max-height:calc(100vh - 90px);
  object-fit:contain;
  border-radius:16px;
  background:#000;
}

#video-modal-close {
  position:absolute;
  top:16px; right:16px;
  width:44px; height:44px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(10px);
  border:none;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  color:#fff;
  font-size:24px;
  line-height:1;
  z-index:1001;
  transition:background 0.2s var(--ease);
}
#video-modal-close:hover,
#video-modal-close:active { background:rgba(255,255,255,0.28); }

/* Visual cue — cards on tablet/phone feel tappable */
@media (max-width:1024px) {
  .c { cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .c:active { opacity:0.85; transition:opacity 0.1s; }
}

#ease-tag {
  position:fixed; bottom:12px; left:50%; transform:translateX(-50%);
  font-size:10.5px; color:rgba(0,11,40,0.28);
  font-family:ui-monospace,'SF Mono',monospace;
  white-space:nowrap; pointer-events:none;
}
</style>
</head>

        <iframe src="https://player.vimeo.com/video/247763188?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479"
                style="position:absolute; inset:0; width:100%; height:100%; border:none; border-radius:var(--r);"
                frameborder="0"
                allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"

<script>
(function () {
  /* ── Email ── */
  var u = 'motionthis';
  var d = 'gmail.com';
  document.getElementById('btn-em').href = 'mai' + 'lto:' + u + '@' + d;

  /* ── Elements ── */
  var identity = document.getElementById('identity');
  var grid     = document.getElementById('grid');
  var cards    = document.querySelectorAll('#masonry > .c');
  var masonry  = document.getElementById('masonry');
  var demoReel = document.getElementById('demo-reel');
  var rigsCards = document.querySelectorAll('#rigs-section .c');
  var open     = false;

  /* ── Sort cards by top position for sequential animation ── */
  var sortedCards = Array.from(cards).sort(function (a, b) {
    return parseFloat(a.style.top) - parseFloat(b.style.top);
  });

  /* ── Password input elements ── */
  var pwBox    = document.getElementById('pw-box');
  var pwInput  = document.getElementById('pw-input');
  var pwBtn    = document.getElementById('pw-btn');
  var authenticated = false;

  function showPassword() {
    pwInput.value = '';
    pwBox.classList.remove('shake');
    pwBox.classList.add('visible');
    setTimeout(function () { pwInput.focus(); }, 400);
  }

  function hidePassword() {
    pwBox.classList.remove('visible');
  }

  function submitPassword() {
    if (pwInput.value === 'Erfan') {
      authenticated = true;
      hidePassword();
      openWorks();
    } else {
      pwInput.value = '';
      pwBox.classList.remove('shake');
      void pwBox.offsetWidth;
      pwBox.classList.add('shake');
      pwInput.focus();
    }
  }

  pwBtn.addEventListener('click', submitPassword);
  pwInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') submitPassword();
  });

  /* ── Gallery fit — smart positioning + zoom ── */
  var iname = document.getElementById('iname');
  var ititle = document.getElementById('ititle');
  var rigsSection = document.getElementById('rigs-section');

  function resetText() {
    iname.style.fontSize = '';
    ititle.style.fontSize = '';
  }

  function shrinkText(scale) {
    var t = Math.max(0.65, scale);
    iname.style.fontSize = Math.round(48 * t) + 'px';
    ititle.style.fontSize = Math.round(32 * t) + 'px';
  }

  function fitGallery() {
    var vw = window.innerWidth;
    var root = document.documentElement;
    var idW = 420;   /* identity panel width */
    var galW = 855;  /* masonry width */
    var idealX = 149; /* ideal sidebar translateX */
    var idealGap = 111; /* ideal gap: 680 - (149+420) */
    var minGap = 30;  /* 30px min gap between profile & works */
    var minLeft = 8;  /* minimum left margin for profile */
    /* Right margin: 12px for 13" laptops, 30px for larger desktops */
    var rightMargin = vw >= 1440 ? 30 : 12;

    if (vw > 1200) {
      /* ── Desktop — sidebar + gallery ── */

      /* Step 1: Can everything fit at ideal positions? */
      if (idealX + idW + idealGap + galW + rightMargin <= vw) {
        root.style.setProperty('--sidebar-x', idealX + 'px');
        root.style.setProperty('--grid-left', (idealX + idW + idealGap) + 'px');
        grid.style.right = rightMargin + 'px';
        masonry.style.zoom = '';
        demoReel.style.zoom = '';
        if (rigsSection) rigsSection.style.zoom = '';
        resetText();
        return;
      }

      /* Step 2: Push profile left, keep ideal gap */
      var xForIdealGap = vw - idW - idealGap - galW - rightMargin;
      if (xForIdealGap >= minLeft) {
        root.style.setProperty('--sidebar-x', xForIdealGap + 'px');
        root.style.setProperty('--grid-left', (xForIdealGap + idW + idealGap) + 'px');
        grid.style.right = rightMargin + 'px';
        masonry.style.zoom = '';
        demoReel.style.zoom = '';
        if (rigsSection) rigsSection.style.zoom = '';
        resetText();
        return;
      }

      /* Step 3: Profile at far left, shrink gap down to 30px min */
      var rightEdge = minLeft + idW; /* 428 */
      var spaceLeft = vw - rightEdge - rightMargin;
      if (spaceLeft >= minGap + galW) {
        root.style.setProperty('--sidebar-x', minLeft + 'px');
        root.style.setProperty('--grid-left', (rightEdge + minGap) + 'px');
        grid.style.right = rightMargin + 'px';
        masonry.style.zoom = '';
        demoReel.style.zoom = '';
        if (rigsSection) rigsSection.style.zoom = '';
        resetText();
        return;
      }

      /* Step 4: Profile at far left, 30px gap, zoom gallery to fit + shrink text */
      var gridLeft = rightEdge + minGap;
      var available = vw - gridLeft - rightMargin;
      var scale = available / galW;
      root.style.setProperty('--sidebar-x', minLeft + 'px');
      root.style.setProperty('--grid-left', gridLeft + 'px');
      grid.style.right = rightMargin + 'px';
      masonry.style.zoom = scale;
      demoReel.style.zoom = scale;
      if (rigsSection) rigsSection.style.zoom = scale;

      /* Shrink profile text when gallery is being squeezed */
      if (scale < 1) {
        shrinkText(scale);
      } else {
        resetText();
      }

    } else {
      /* ── iPad + iPhone — profile on top, gallery below, zoom to fit ── */
      grid.style.right = '';
      root.style.removeProperty('--sidebar-x');
      root.style.removeProperty('--grid-left');
      /* More side-padding on small tablets/phones so the frame isn't clipped */
      var sidePad = vw <= 820 ? 40 : 24;
      var available = vw - sidePad;
      var scale = Math.min(1, available / 855);
      masonry.style.zoom = scale;
      demoReel.style.zoom = scale;
      if (rigsSection) rigsSection.style.zoom = scale;
      resetText();
    }
  }

  fitGallery();
  window.addEventListener('resize', fitGallery);

  /* ── Open / Close works ── */
  function openWorks() {
    open = true;
    identity.classList.add('sidebar');
    grid.classList.add('show');
    fitGallery();

    sortedCards.forEach(function (c, i) {
      var delay = 300 + i * 80;
      setTimeout(function () {
        c.classList.add('show');
        var v = c.querySelector('video');
        if (v) v.play().catch(function(){});
      }, delay);
    });

    /* Show Rigs section after masonry cards */
    var rigsDelay = 300 + sortedCards.length * 80 + 200;
    setTimeout(function () {
      var rs = document.getElementById('rigs-section');
      if (rs) rs.classList.add('show');
      rigsCards.forEach(function (c, i) {
        setTimeout(function () {
          c.classList.add('show');
          var v = c.querySelector('video');
          if (v) v.play().catch(function(){});
        }, i * 80);
      });
    }, rigsDelay);

    /* Show Demo Reel after rigs */
    var demoDelay = rigsDelay + rigsCards.length * 80 + 200;
    setTimeout(function () {
      demoReel.classList.add('show');
    }, demoDelay);
  }

  function closeWorks() {
    open = false;
    hidePassword();
    demoReel.classList.remove('show');
    var rs = document.getElementById('rigs-section');
    if (rs) rs.classList.remove('show');
    rigsCards.forEach(function (c) { c.classList.remove('show'); });
    var reversed = sortedCards.slice().reverse();
    reversed.forEach(function (c, i) {
      var delay = i * 50;
      setTimeout(function () { c.classList.remove('show'); }, delay);
    });

    setTimeout(function () {
      grid.classList.remove('show');
      identity.classList.remove('sidebar');
    }, cards.length * 50 + 200);
  }

  /* ── Tablet & Mobile: IntersectionObserver fade-in on scroll ── */
  var isScrollLayout = window.matchMedia('(max-width:1200px)').matches;
  if (isScrollLayout) {
    var observer = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('show');
          var v = entry.target.querySelector('video');
          if (v) v.play().catch(function(){});
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15 });

    cards.forEach(function (c) { observer.observe(c); });
    rigsCards.forEach(function (c) { observer.observe(c); });

    /* ── Video lightbox — tap a card to expand on tablet/phone ── */
    var modal = document.getElementById('video-modal');
    var modalPlayer = document.getElementById('video-modal-player');
    var modalClose = document.getElementById('video-modal-close');

    function openModal(src) {
      modalPlayer.src = src;
      modal.classList.add('show');
      document.body.style.overflow = 'hidden';
      modalPlayer.play().catch(function(){});
    }
    function closeModal() {
      modalPlayer.pause();
      modalPlayer.removeAttribute('src');
      modalPlayer.load();
      modal.classList.remove('show');
      document.body.style.overflow = '';
    }

    function attachTap(card) {
      card.addEventListener('click', function () {
        var source = card.querySelector('video source');
        if (source && source.src) openModal(source.src);
      });
    }
    cards.forEach(attachTap);
    rigsCards.forEach(attachTap);

    modalClose.addEventListener('click', closeModal);
    modal.addEventListener('click', function (e) {
      if (e.target === modal) closeModal();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && modal.classList.contains('show')) closeModal();
    });

    /* Override openWorks for scroll-based reveal on tablet & phone */
    openWorks = function () {
      open = true;
      identity.classList.add('sidebar');
      grid.classList.add('show');
      var rs = document.getElementById('rigs-section');
      if (rs) rs.classList.add('show');
      demoReel.classList.add('show');
      fitGallery();
      /* Cards fade in via IntersectionObserver as user scrolls */
    };
  }

  /* ── Toggle ── */
  window.toggle = function () {
    if (!open && !authenticated) {
      showPassword();
      return;
    }
    if (!open) {
      openWorks();
    } else {
      closeWorks();
    }
  };
}());
</script>
